# docker-compose.yml
services:
  wordpress:
    image: wordpress
    ports: ["8080:80"]
    volumes:
      - /Users/phillip/Code/ci-calendar/wp/ci-calendar:/var/www/html/wp-content/plugins/ci-calendar
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_PASSWORD: password
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_NAME: wordpress
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: wordpress