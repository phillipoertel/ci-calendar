<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Embedded Page</title>
  <style>
    body {
      margin: 0;
      padding: 100px;
      box-sizing: border-box;
      min-height: 100vh;
    }

    iframe {
      display: block;
      width: 100%;
      height: 600px;
      border: 1px solid red;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <iframe src="http://localhost:8000/calendar.html" loading="lazy" sandbox="allow-scripts"></iframe>
</body>
</html>
