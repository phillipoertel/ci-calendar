<meta charset="UTF-8">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #ffffff;
      --surface:   #f8f9fa;
      --border:    #e9ecef;
      --accent:    hsl(38, 100%, 33%);
      --accent2:   hsl(38, 100%, 33%);
      --text:      #212529;
      --muted:     #6c757d;
      --today-bg:  #e3f2fd;
      --today-acc: #1976d2;
      --past:      #adb5bd;
      --radius:    10px;
    }

    .ci-calendar {
      /* Inherit typography and colors from parent page */
      font-size: inherit;
      line-height: inherit;
      color: inherit;
      background: transparent;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
      padding: 0 1rem;
    }

    .controls {
      display: flex;
      gap: 0.4rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .toggle-btn {
      background: var(--border);
      border: 1px solid transparent;
      color: var(--muted);
      padding: 0.25rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      transition: all 0.15s;
    }
    .toggle-btn:focus { outline: none; }
    .toggle-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .toggle-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    #status {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    #status .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 0.75rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #error-box {
      margin: 1.5rem auto;
      max-width: 600px;
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      color: #721c24;
      font-size: 0.88rem;
      display: none;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1rem 3rem;
    }

    /* ── Month group ─────────────────────────────── */
    .month-group { margin-bottom: 2rem; }

    .month-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 0 0.6rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.75rem;
    }

    /* ── Schedule card (deduplicated recurring view) ── */
    .schedule-card {
      display: grid;
      grid-template-columns: 138px 1fr;
      gap: 0 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.5rem 1rem;
      margin-bottom: 0.4rem;
      transition: border-color 0.15s;
      cursor: default;
    }

    .schedule-card:hover { border-color: var(--accent); }

    .recur-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 3px;
      gap: 4px;
      min-width: 0;
    }

    .recur-icon {
      font-size: 1.1rem;
      color: var(--accent);
      line-height: 1;
    }

    .recur-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.02em;
      word-break: break-word;
    }

    /* ── Event card ──────────────────────────────── */
    .event-card {
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 0 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.5rem 1rem;
      margin-bottom: 0.4rem;
      transition: border-color 0.15s;
      cursor: default;
    }

    .event-card:hover { border-color: var(--accent); }

    .event-card.is-today {
      background: var(--today-bg);
      border-color: var(--today-acc);
    }

    .event-card.is-multiday {
      border-left: 3px solid var(--accent2);
    }

    .date-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 2px;
      min-width: 0;
    }

    .date-day {
      font-size: 1.55rem;
      font-weight: 700;
      line-height: 1;
      color: var(--text);
    }

    .event-card.is-today .date-day { color: var(--today-acc); }

    .date-dow {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 2px;
    }

    .info-col { min-width: 0; }

    .event-title {
      font-weight: 600;
      font-size: 0.97rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .event-loc-link {
      font-weight: 400;
      font-size: 0.85rem;
      color: var(--accent);
      text-decoration: none;
      margin-left: 0.3rem;
    }
    .event-loc-link:hover { text-decoration: underline; }

    .event-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem 1rem;
      margin-top: 0;
    }

    .meta-chip {
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .meta-chip svg { flex-shrink: 0; opacity: 0.7; }

    .event-desc {
      margin-top: 0;
      font-size: 0.82rem;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .recurring-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: #fff;
      color: var(--accent2);
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 0.4rem;
      vertical-align: middle;
    }

    .today-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: #1a3050;
      color: var(--today-acc);
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 0.4rem;
      vertical-align: middle;
    }

    /* ── Subscribe bar ───────────────────────────── */
    .subscribe-bar {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.25rem;
    }

    .info-link {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 400;
      color: hsl(38, 100%, 33%);
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .info-link:focus { outline: none; }
    .info-link:hover { opacity: 0.75; }

    .pipe {
      color: var(--muted);
      font-size: 0.8rem;
      user-select: none;
    }

    /* ── Subscribe modal ─────────────────────────── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-backdrop.open { display: flex; }

    .modal-box {
      background: #fff;
      border-radius: var(--radius);
      padding: 1.5rem 1.75rem;
      max-width: 340px;
      width: 90%;
      position: relative;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    .modal-title {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 0.25rem;
      color: var(--text);
    }

    .modal-desc {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .modal-links {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .modal-btn {
      display: block;
      text-align: center;
      padding: 0.55rem 1rem;
      border-radius: 7px;
      font-size: 0.88rem;
      font-weight: 500;
      text-decoration: none;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, background 0.15s;
    }

    .modal-btn:hover { border-color: var(--accent); background: #fff; }

    .modal-btn.copied { color: #198754; border-color: #198754; }

    .modal-close {
      position: absolute;
      top: 0.6rem;
      right: 0.85rem;
      background: none;
      border: none;
      font-size: 1.3rem;
      color: var(--muted);
      cursor: pointer;
      line-height: 1;
      padding: 0;
    }

    .modal-close:hover { color: var(--text); }

    /* ── Responsive ──────────────────────────────── */
    @media (max-width: 480px) {
      .event-card { grid-template-columns: 52px 1fr; gap: 0 0.75rem; padding: 0.75rem; }
      .date-day { font-size: 1.3rem; }
      .controls { gap: 0.5rem; }
      .toggle-btn { padding: 0.2rem 0.6rem; font-size: 0.75rem; }
    }
  </style>

<link rel='stylesheet' id='wp-block-library-css' href='https://danceshare.dk/wp-includes/css/dist/block-library/style.min.css?ver=6.9.4' media='all' />
<link rel='stylesheet' id='twentynineteen-style-css' href='https://danceshare.dk/wp-content/themes/twentynineteen/style.css?ver=3.0' media='all' />

<div class="ci-calendar">
  <div class="top-bar">
    <div class="controls">
      <button class="toggle-btn active" id="btn-schedule" onclick="setFilter('schedule')">Weekly</button>
      <button class="toggle-btn" id="btn-non-recurring" onclick="setFilter('non-recurring')">Other</button>
      <button class="toggle-btn" id="btn-recurring" onclick="setFilter('recurring')">All</button>
    </div>
    <div class="subscribe-bar">
      <button class="info-link" onclick="openSubscribeModal()">Subscribe to this calendar</button>
      <button class="info-link" onclick="openInfoModal('send-update')">Suggest a change</button>
    </div>
  </div>

<div id="status">
  <div class="spinner"></div><br>Loading calendar…
</div>
<div id="error-box"></div>

<main id="main" style="display:none"></main>

<!-- Info modal -->
<div id="info-modal" class="modal-backdrop" onclick="closeInfoModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeInfoModal()">&times;</button>
    <div class="modal-title" id="info-modal-title"></div>
    <div class="modal-desc" id="info-modal-body"></div>
  </div>
</div>

<!-- Subscribe modal -->
<div id="subscribe-modal" class="modal-backdrop" onclick="closeSubscribeModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeSubscribeModal()">&times;</button>
    <div class="modal-title">Subscribe to Calendar</div>
    <div class="modal-desc">Add this calendar to your own calendar app to stay up to date. Click the button for the calendar you use</div>
    <div class="modal-links" id="modal-links"></div>
  </div>
</div>
</div>

</div>
