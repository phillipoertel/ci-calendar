<meta charset="UTF-8">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #ffffff;
      --surface:   #f8f9fa;
      --border:    #e9ecef;
      --accent:    hsl(38, 100%, 33%);
      --accent2:   hsl(38, 100%, 33%);
      --text:      #212529;
      --muted:     #6c757d;
      --today-bg:  #e3f2fd;
      --today-acc: #1976d2;
      --past:      #adb5bd;
      --radius:    10px;
    }

    .ci-calendar {
      /* Inherit typography and colors from parent page */
      font-size: inherit;
      line-height: inherit;
      color: inherit;
      background: transparent;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
      padding: 0 1rem;
    }

    .controls {
      display: flex;
      gap: 0.4rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .toggle-btn {
      background: var(--border);
      border: 1px solid transparent;
      color: var(--muted);
      padding: 0.25rem 0.75rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      transition: all 0.15s;
    }
    .toggle-btn:focus { outline: none; }
    .toggle-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .toggle-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    #status {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    #status .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 0.75rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #error-box {
      margin: 1.5rem auto;
      max-width: 600px;
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      color: #721c24;
      font-size: 0.88rem;
      display: none;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1rem 3rem;
    }

    /* ── Month group ─────────────────────────────── */
    .month-group { margin-bottom: 2rem; }

    .month-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 0 0.6rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.75rem;
    }

    /* ── Schedule card (deduplicated recurring view) ── */
    .schedule-card {
      display: grid;
      grid-template-columns: 138px 1fr;
      gap: 0 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.5rem 1rem;
      margin-bottom: 0.4rem;
      transition: border-color 0.15s;
      cursor: default;
    }

    .schedule-card:hover { border-color: var(--accent); }

    .recur-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 3px;
      gap: 4px;
      min-width: 0;
    }

    .recur-icon {
      font-size: 1.1rem;
      color: var(--accent);
      line-height: 1;
    }

    .recur-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.02em;
      word-break: break-word;
    }

    /* ── Event card ──────────────────────────────── */
    .event-card {
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 0 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.5rem 1rem;
      margin-bottom: 0.4rem;
      transition: border-color 0.15s;
      cursor: default;
    }

    .event-card:hover { border-color: var(--accent); }

    .event-card.is-today {
      background: var(--today-bg);
      border-color: var(--today-acc);
    }

    .event-card.is-multiday {
      border-left: 3px solid var(--accent2);
    }

    .date-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 2px;
      min-width: 0;
    }

    .date-day {
      font-size: 1.55rem;
      font-weight: 700;
      line-height: 1;
      color: var(--text);
    }

    .event-card.is-today .date-day { color: var(--today-acc); }

    .date-dow {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 2px;
    }

    .info-col { min-width: 0; }

    .event-title {
      font-weight: 600;
      font-size: 0.97rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .event-loc-link {
      font-weight: 400;
      font-size: 0.85rem;
      color: var(--accent);
      text-decoration: none;
      margin-left: 0.3rem;
    }
    .event-loc-link:hover { text-decoration: underline; }

    .event-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem 1rem;
      margin-top: 0;
    }

    .meta-chip {
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .meta-chip svg { flex-shrink: 0; opacity: 0.7; }

    .event-desc {
      margin-top: 0;
      font-size: 0.82rem;
      color: var(--muted);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .recurring-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: #fff;
      color: var(--accent2);
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 0.4rem;
      vertical-align: middle;
    }

    .today-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: #1a3050;
      color: var(--today-acc);
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 0.4rem;
      vertical-align: middle;
    }

    /* ── Subscribe bar ───────────────────────────── */
    .subscribe-bar {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.25rem;
    }

    .info-link {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 400;
      color: hsl(38, 100%, 33%);
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .info-link:focus { outline: none; }
    .info-link:hover { opacity: 0.75; }

    .pipe {
      color: var(--muted);
      font-size: 0.8rem;
      user-select: none;
    }

    /* ── Subscribe modal ─────────────────────────── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-backdrop.open { display: flex; }

    .modal-box {
      background: #fff;
      border-radius: var(--radius);
      padding: 1.5rem 1.75rem;
      max-width: 340px;
      width: 90%;
      position: relative;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    .modal-title {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 0.25rem;
      color: var(--text);
    }

    .modal-desc {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .modal-links {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .modal-btn {
      display: block;
      text-align: center;
      padding: 0.55rem 1rem;
      border-radius: 7px;
      font-size: 0.88rem;
      font-weight: 500;
      text-decoration: none;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, background 0.15s;
    }

    .modal-btn:hover { border-color: var(--accent); background: #fff; }

    .modal-btn.copied { color: #198754; border-color: #198754; }

    .modal-close {
      position: absolute;
      top: 0.6rem;
      right: 0.85rem;
      background: none;
      border: none;
      font-size: 1.3rem;
      color: var(--muted);
      cursor: pointer;
      line-height: 1;
      padding: 0;
    }

    .modal-close:hover { color: var(--text); }

    /* ── Responsive ──────────────────────────────── */
    @media (max-width: 480px) {
      .event-card { grid-template-columns: 52px 1fr; gap: 0 0.75rem; padding: 0.75rem; }
      .date-day { font-size: 1.3rem; }
      .controls { gap: 0.5rem; }
      .toggle-btn { padding: 0.2rem 0.6rem; font-size: 0.75rem; }
    }

<script>
// ─── Config ────────────────────────────────────────────────────────────────
const ICAL_URL =
  'https://calendar.google.com/calendar/ical/' +
  '7cd67ecc1e05891f0a89b08a145dca65102fb64fa16b18e4385f89895d2ac18f%40group.calendar.google.com' +
  '/public/basic.ics';

const PROXIES = [
  url => `https://corsproxy.me-453.workers.dev/?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];

// ─── State ─────────────────────────────────────────────────────────────────
let allEvents = [];
let filter    = 'schedule';
const today   = new Date(); today.setHours(0,0,0,0);

// ─── iCal parser ───────────────────────────────────────────────────────────
function parseICal(raw) {
  // Unfold continuation lines (RFC 5545 §3.1)
  const text = raw.replace(/\r\n[ \t]/g, '').replace(/\n[ \t]/g, '');
  const lines = text.split(/\r?\n/);

  const events = [];
  let ev = null;

  for (const line of lines) {
    if (line === 'BEGIN:VEVENT') { ev = {}; continue; }
    if (line === 'END:VEVENT')   { if (ev) events.push(ev); ev = null; continue; }
    if (!ev) continue;

    const ci = line.indexOf(':');
    if (ci === -1) continue;
    const keyFull = line.slice(0, ci);
    const val     = line.slice(ci + 1);

    // key may have parameters: DTSTART;TZID=Europe/Berlin
    const si  = keyFull.indexOf(';');
    const key = si === -1 ? keyFull : keyFull.slice(0, si);
    const par = si === -1 ? ''       : keyFull.slice(si + 1);

    // keep first occurrence (recurring overrides come later as EXDATE etc.)
    if (!(key in ev)) ev[key] = { val, par };
    // RRULE we always want
    if (key === 'RRULE') ev[key] = { val, par };
  }

  return events.map(parseEvent).filter(Boolean);
}

function unescape(s) {
  return s.replace(/\\n/g, '\n').replace(/\\,/g, ',').replace(/\\;/g, ';').replace(/\\\\/g, '\\');
}

function parseICalDate(valObj) {
  if (!valObj) return null;
  const { val, par } = valObj;

  // VALUE=DATE  → YYYYMMDD  (all-day)
  const allDay = par.includes('VALUE=DATE') || val.length === 8;
  const s = val.replace('Z', '');

  if (allDay) {
    const y = +s.slice(0,4), m = +s.slice(4,6)-1, d = +s.slice(6,8);
    return { date: new Date(y, m, d), allDay: true };
  }
  // Datetime
  const y  = +s.slice(0,4),  mo = +s.slice(4,6)-1, d  = +s.slice(6,8);
  const hh = +s.slice(9,11), mm = +s.slice(11,13),  ss = +s.slice(13,15);
  const utc = val.endsWith('Z');
  const date = utc
    ? new Date(Date.UTC(y, mo, d, hh, mm, ss))
    : new Date(y, mo, d, hh, mm, ss);
  return { date, allDay: false };
}

function parseEvent(ev) {
  const start = parseICalDate(ev['DTSTART']);
  if (!start) return null;
  const end   = parseICalDate(ev['DTEND'] || ev['DURATION']);
  const title = unescape((ev['SUMMARY']?.val  || '(No title)'));
  const desc  = unescape((ev['DESCRIPTION']?.val || ''));
  const loc   = unescape((ev['LOCATION']?.val || ''));
  const recur = !!ev['RRULE'];
  const uid   = ev['UID']?.val || '';

  // Multi-day check (all-day spanning >1 day)
  let multiDay = false;
  if (start.allDay && end?.allDay) {
    const diff = (end.date - start.date) / 86400000;
    if (diff > 1) multiDay = true;
  }

  return { start, end, title, desc, loc, recur, uid, multiDay };
}

// ─── Recurring event expansion ─────────────────────────────────────────────
// We expand recurring events up to 1 year ahead from today, and up to
// 3 months back, capped at 200 occurrences total.
function expandEvents(events) {
  const rangeStart = new Date(today); rangeStart.setMonth(rangeStart.getMonth() - 3);
  const rangeEnd   = new Date(today); rangeEnd.setFullYear(rangeEnd.getFullYear() + 1);

  const out = [];

  for (const ev of events) {
    if (!ev.recur) {
      out.push(ev);
      continue;
    }

    const rrule = parseRRule(ev);
    if (!rrule) { out.push(ev); continue; }

    let cursor = new Date(ev.start.date);
    let count  = 0;
    const max  = 200;

    while (cursor <= rangeEnd && count < max) {
      if (cursor >= rangeStart) {
        const dur = ev.end ? ev.end.date - ev.start.date : 0;
        const newStart = new Date(cursor);
        const newEnd   = ev.end ? new Date(cursor.getTime() + dur) : null;
        out.push({
          ...ev,
          start: { date: newStart, allDay: ev.start.allDay },
          end:   newEnd ? { date: newEnd, allDay: ev.end.allDay } : null,
          recur: true,
        });
      }
      cursor = nextOccurrence(cursor, rrule);
      count++;
    }
  }

  return out.sort((a, b) => a.start.date - b.start.date);
}

function parseRRule(ev) {
  const raw = ev['RRULE']?.val || '';  // stored by parser
  // Re-access from original parsed event — but we stripped that.
  // We stored rrule in the event during parseEvent indirectly via the ev object.
  // Let's store it explicitly:
  return ev._rrule || null;
}

// ─── Re-parse with rrule stored ────────────────────────────────────────────
function parseICal2(raw) {
  const text = raw.replace(/\r\n[ \t]/g, '').replace(/\n[ \t]/g, '');
  const lines = text.split(/\r?\n/);
  const events = [];
  let ev = null;

  for (const line of lines) {
    if (line === 'BEGIN:VEVENT') { ev = {}; continue; }
    if (line === 'END:VEVENT')   { if (ev) events.push(ev); ev = null; continue; }
    if (!ev) continue;
    const ci = line.indexOf(':');
    if (ci === -1) continue;
    const keyFull = line.slice(0, ci);
    const val     = line.slice(ci + 1);
    const si      = keyFull.indexOf(';');
    const key     = si === -1 ? keyFull : keyFull.slice(0, si);
    const par     = si === -1 ? '' : keyFull.slice(si + 1);
    if (!(key in ev)) ev[key] = { val, par };
    if (key === 'RRULE') ev[key] = { val, par };
  }

  return events.map(raw => {
    const parsed = parseEvent(raw);
    if (!parsed) return null;
    if (raw['RRULE']) {
      parsed._rrule = parseRRuleStr(raw['RRULE'].val);
    }
    return parsed;
  }).filter(Boolean);
}

function parseRRuleStr(str) {
  const parts = {};
  for (const part of str.split(';')) {
    const [k, v] = part.split('=');
    parts[k] = v;
  }
  return parts;
}

function nextOccurrence(date, rule) {
  const d = new Date(date);
  const freq = rule['FREQ'];
  const interval = parseInt(rule['INTERVAL'] || '1', 10);

  if (freq === 'DAILY')   { d.setDate(d.getDate() + interval); }
  else if (freq === 'WEEKLY')  { d.setDate(d.getDate() + 7 * interval); }
  else if (freq === 'MONTHLY') { d.setMonth(d.getMonth() + interval); }
  else if (freq === 'YEARLY')  { d.setFullYear(d.getFullYear() + interval); }
  else { d.setDate(d.getDate() + 1); } // fallback
  return d;
}

// ─── Fetch ─────────────────────────────────────────────────────────────────
async function fetchWithProxy(url, proxies) {
  for (const makeProxy of proxies) {
    try {
      const res = await fetch(makeProxy(url), { cache: 'no-store' });
      if (!res.ok) continue;
      const text = await res.text();
      if (text.includes('BEGIN:VCALENDAR')) return text;
    } catch (_) {}
  }
  throw new Error('All CORS proxies failed. Try opening the page from a server or browser extension.');
}

// ─── Render ────────────────────────────────────────────────────────────────
const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];

function fmtTime(d, allDay) {
  if (allDay) return 'All day';
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function fmtTimeRange(ev) {
  if (ev.start.allDay && ev.multiDay) {
    const endD = new Date(ev.end.date); endD.setDate(endD.getDate() - 1);
    return `${ev.start.date.toLocaleDateString([], {month:'short',day:'numeric'})} – ${endD.toLocaleDateString([], {month:'short',day:'numeric'})}`;
  }
  if (ev.start.allDay) return 'All day';
  const s = fmtTime(ev.start.date, false);
  if (!ev.end) return s;
  const e = fmtTime(ev.end.date, false);
  return `${s} – ${e}`;
}

function monthKey(d) { return `${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}`; }
function monthLabel(d) { return `${MONTHS[d.getMonth()]} ${d.getFullYear()}`; }

function isToday(d) {
  return d.getFullYear() === today.getFullYear() &&
         d.getMonth()    === today.getMonth() &&
         d.getDate()     === today.getDate();
}

function isPast(ev) {
  const ref = ev.end ? ev.end.date : ev.start.date;
  return ref < today;
}

const clockIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
const pinIcon   = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;

function renderEvents(events) {
  const main = document.getElementById('main');
  main.innerHTML = '';

  if (!events.length) {
    main.innerHTML = '<p style="color:var(--muted);text-align:center;padding:3rem 0">No events found.</p>';
    main.style.display = '';
    return;
  }

  // Group by month
  const groups = new Map();
  for (const ev of events) {
    const k = monthKey(ev.start.date);
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(ev);
  }

  for (const [key, evs] of groups) {
    const section = document.createElement('section');
    section.className = 'month-group';
    section.dataset.month = key;

    const label = document.createElement('div');
    label.className = 'month-label';
    label.textContent = monthLabel(evs[0].start.date);
    section.appendChild(label);

    for (const ev of evs) {
      section.appendChild(buildCard(ev));
    }
    main.appendChild(section);
  }

  main.style.display = '';
}

function buildCard(ev) {
  const card = document.createElement('div');
  card.className = 'event-card';
  if (isToday(ev.start.date)) card.classList.add('is-today');
  if (ev.multiDay)            card.classList.add('is-multiday');

  // Date column
  const dateCol = document.createElement('div');
  dateCol.className = 'date-col';
  dateCol.innerHTML = `
    <div class="date-day">${ev.start.date.getDate()}</div>
    <div class="date-dow">${DOW[ev.start.date.getDay()]}</div>
  `;

  // Info column
  const infoCol = document.createElement('div');
  infoCol.className = 'info-col';

  const locShort = ev.loc ? ev.loc.split(',')[0].trim() : '';
  const locLink  = ev.loc
    ? ` <a class="event-loc-link" href="https://www.google.com/maps?q=${encodeURIComponent(ev.loc)}" target="_blank" rel="noopener">@ ${escHtml(locShort)}</a>`
    : '';

  const titleEl = document.createElement('div');
  titleEl.className = 'event-title';
  titleEl.innerHTML =
    escHtml(ev.title) + locLink +
    (ev.recur   ? '<span class="recurring-badge">↻ recurring</span>' : '') +
    (isToday(ev.start.date) ? '<span class="today-badge">Today</span>' : '');

  const meta = document.createElement('div');
  meta.className = 'event-meta';
  meta.innerHTML = `<span class="meta-chip">${clockIcon} ${fmtTimeRange(ev)}</span>`;

  infoCol.appendChild(titleEl);
  infoCol.appendChild(meta);

  if (ev.desc.trim()) {
    const descEl = document.createElement('div');
    descEl.className = 'event-desc';
    descEl.innerHTML = ev.desc.trim();
    infoCol.appendChild(descEl);
  }

  card.appendChild(dateCol);
  card.appendChild(infoCol);
  return card;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Schedule (deduplicated recurring) view ────────────────────────────────
const BYDAY_NAMES = { MO:'Monday', TU:'Tuesday', WE:'Wednesday', TH:'Thursday', FR:'Friday', SA:'Saturday', SU:'Sunday' };
const ORD = ['','1st','2nd','3rd','4th','5th'];

function rruleToHuman(rrule) {
  if (!rrule) return 'Recurring';
  const freq     = rrule['FREQ'] || '';
  const interval = parseInt(rrule['INTERVAL'] || '1', 10);
  const byday    = rrule['BYDAY'] || '';
  const bymonthday = rrule['BYMONTHDAY'] || '';

  if (freq === 'DAILY') {
    return interval === 1 ? 'Every day' : `Every ${interval} days`;
  }

  if (freq === 'WEEKLY') {
    if (byday) {
      const days = byday.split(',').map(d => BYDAY_NAMES[d] || d);
      const joined = days.length === 1 ? days[0]
        : days.slice(0, -1).join(', ') + ' & ' + days[days.length - 1];
      return interval === 1 ? `Every ${joined}` : `Every ${interval} weeks on ${joined}`;
    }
    return interval === 1 ? 'Every week' : `Every ${interval} weeks`;
  }

  if (freq === 'MONTHLY') {
    if (bymonthday) {
      const d = parseInt(bymonthday, 10);
      const suf = d === 1 || d === 21 || d === 31 ? 'st'
                : d === 2 || d === 22 ? 'nd'
                : d === 3 || d === 23 ? 'rd' : 'th';
      return `Monthly on the ${d}${suf}`;
    }
    if (byday) {
      // e.g. "1TU" = 1st Tuesday, "-1FR" = last Friday
      const m = byday.match(/^(-?\d)([A-Z]{2})$/);
      if (m) {
        const n   = parseInt(m[1], 10);
        const day = BYDAY_NAMES[m[2]] || m[2];
        const ord = n === -1 ? 'last' : (ORD[n] || `${n}th`);
        return `Monthly on the ${ord} ${day}`;
      }
    }
    return interval === 1 ? 'Monthly' : `Every ${interval} months`;
  }

  if (freq === 'YEARLY') return 'Yearly';

  return 'Recurring';
}

function renderSchedule(events) {
  const main = document.getElementById('main');
  main.innerHTML = '';

  // Deduplicate by uid, keeping first occurrence (earliest date)
  const seen = new Set();
  const unique = events.filter(ev => {
    if (!ev.recur || seen.has(ev.uid)) return false;
    seen.add(ev.uid);
    return true;
  });

  // Sort Mon–Sun (getDay(): Sun=0 → mapped to 6, Mon=1 → 0, …)
  unique.sort((a, b) => (a.start.date.getDay() + 6) % 7 - (b.start.date.getDay() + 6) % 7);

  if (!unique.length) {
    main.innerHTML = '<p style="color:var(--muted);text-align:center;padding:3rem 0">No recurring events found.</p>';
    main.style.display = '';
    return;
  }

  for (const ev of unique) {
    const card = document.createElement('div');
    card.className = 'schedule-card';

    const recurCol = document.createElement('div');
    recurCol.className = 'recur-col';
    recurCol.innerHTML = `<span class="recur-icon">↻</span><span class="recur-label">${escHtml(rruleToHuman(ev._rrule))}</span><span class="recur-label">${escHtml(fmtTimeRange(ev))}</span>`;

    const infoCol = document.createElement('div');
    infoCol.className = 'info-col';

    const locShortS = ev.loc ? ev.loc.split(',')[0].trim() : '';
    const locLinkS  = ev.loc
      ? ` <a class="event-loc-link" href="https://www.google.com/maps?q=${encodeURIComponent(ev.loc)}" target="_blank" rel="noopener">@ ${escHtml(locShortS)}</a>`
      : '';

    const titleEl = document.createElement('div');
    titleEl.className = 'event-title';
    titleEl.innerHTML = escHtml(ev.title) + locLinkS;

    const meta = document.createElement('div');
    meta.className = 'event-meta';
    meta.innerHTML = '';

    infoCol.appendChild(titleEl);
    infoCol.appendChild(meta);

    if (ev.desc.trim()) {
      const descEl = document.createElement('div');
      descEl.className = 'event-desc';
      descEl.innerHTML = ev.desc.trim();
      infoCol.appendChild(descEl);
    }

    card.appendChild(recurCol);
    card.appendChild(infoCol);
    main.appendChild(card);
  }

  main.style.display = '';
}

// ─── Info modal ────────────────────────────────────────────────────────────
const INFO_CONTENT = {
  'send-update': {
    title: 'Suggest a change',
    body: () => {
      const em = ['ci-copenhagen', 'email', 'com'].join('\u0040').replace('\u0040email', '.email@');
      // em = ci-copenhagen@email.com, assembled at runtime
      return `Please send us your updates to <a href="mailto:${em}">${em}</a>. You\u2019re also welcome to help maintain the Google calendar, just write to us.`;
    },
  },
};

function openInfoModal(key) {
  const content = INFO_CONTENT[key];
  if (!content) return;
  document.getElementById('info-modal-title').textContent = content.title;
  const body = typeof content.body === 'function' ? content.body() : content.body;
  document.getElementById('info-modal-body').innerHTML = body;
  document.getElementById('info-modal').classList.add('open');
}

function closeInfoModal(e) {
  if (!e || e.target === document.getElementById('info-modal') || !e.target.closest) {
    document.getElementById('info-modal').classList.remove('open');
  }
}

// ─── Subscribe modal ───────────────────────────────────────────────────────
const WEBCAL_URL = ICAL_URL.replace(/^https/, 'webcal');
const CAL_ID     = decodeURIComponent((ICAL_URL.match(/\/ical\/([^/]+)\//) || [])[1] || '');
const GCAL_SUBSCRIBE  = `https://calendar.google.com/calendar/r?cid=${CAL_ID}`;
const OUTLOOK_SUBSCRIBE = `https://outlook.live.com/owa/?path=/calendar/action/compose&rru=addsubscription&url=${encodeURIComponent(WEBCAL_URL)}`;

const SUBSCRIBE_LINKS = [
  { label: 'Google Calendar', href: GCAL_SUBSCRIBE },
  { label: 'Apple Calendar',  href: WEBCAL_URL },
  { label: 'Outlook',         href: OUTLOOK_SUBSCRIBE },
];

function openSubscribeModal() {
  const linksEl = document.getElementById('modal-links');
  if (!linksEl.children.length) {
    for (const { label, href } of SUBSCRIBE_LINKS) {
      const a = document.createElement('a');
      a.className = 'modal-btn';
      a.href = href;
      a.target = '_blank';
      a.rel = 'noopener';
      a.textContent = label;
      linksEl.appendChild(a);
    }
    const copyBtn = document.createElement('button');
    copyBtn.className = 'modal-btn';
    copyBtn.textContent = 'Copy iCal link';
    copyBtn.onclick = () => {
      navigator.clipboard.writeText(WEBCAL_URL).then(() => {
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => { copyBtn.textContent = 'Copy iCal link'; copyBtn.classList.remove('copied'); }, 2000);
      });
    };
    linksEl.appendChild(copyBtn);
  }
  document.getElementById('subscribe-modal').classList.add('open');
}

function closeSubscribeModal(e) {
  if (!e || e.target === document.getElementById('subscribe-modal') || !e.target.closest) {
    document.getElementById('subscribe-modal').classList.remove('open');
  }
}

// ─── Filter / view ─────────────────────────────────────────────────────────
function setFilter(f) {
  filter = f;
  document.getElementById('btn-recurring').classList.toggle('active', f === 'recurring');
  document.getElementById('btn-non-recurring').classList.toggle('active', f === 'non-recurring');
  document.getElementById('btn-schedule').classList.toggle('active', f === 'schedule');
  applyFilter();
}

function applyFilter() {
  const future = allEvents.filter(e => !isPast(e));
  if (filter === 'schedule') {
    renderSchedule(future);
  } else {
    let evs = future;
    if (filter === 'recurring') evs = evs.filter(e => e.recur);
    else if (filter === 'non-recurring') evs = evs.filter(e => !e.recur);
    renderEvents(evs);
  }
}

// ─── Init ──────────────────────────────────────────────────────────────────
(async () => {
  const statusEl = document.getElementById('status');
  const errorEl  = document.getElementById('error-box');

  try {
    const raw = await fetchWithProxy(ICAL_URL, PROXIES);
    allEvents = expandEvents(parseICal2(raw));
    const futureEvents = allEvents.filter(e => !isPast(e));
    const nonRecurringCount = futureEvents.filter(e => !e.recur).length;
    const recurringCount = futureEvents.filter(e => e.recur).length;
    const scheduleCount = new Set(futureEvents.filter(e => e.recur).map(e => e.uid)).size;
    document.getElementById('btn-schedule').textContent = `Weekly (${scheduleCount})`;
    document.getElementById('btn-non-recurring').textContent = `Other (${nonRecurringCount})`;
    document.getElementById('btn-recurring').textContent = `All (${recurringCount})`;
    statusEl.style.display = 'none';
    applyFilter();
  } catch (err) {
    statusEl.style.display = 'none';
    errorEl.style.display = 'block';
    errorEl.innerHTML = `<strong>Could not load calendar.</strong><br>${escHtml(err.message)}<br>
      <small style="opacity:.7">You may need to open this file via a local server (e.g. <code>python3 -m http.server</code>).</small>`;
  }
})();
</script>
